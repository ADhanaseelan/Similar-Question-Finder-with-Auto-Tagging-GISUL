services:
  # ----------------------------------------
  # 1. Python FastAPI Backend
  # ----------------------------------------
  - type: web
    name: learnconnect-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  # ----------------------------------------
  # 2. Next.js React Frontend
  # ----------------------------------------
  - type: web
    name: learnconnect-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      # This incredibly powerful feature tells Render to grab the 
      # live public URL of the backend service and pass it into the 
      # frontend automatically during the build process!
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: learnconnect-backend
          envVarKey: RENDER_EXTERNAL_URL
